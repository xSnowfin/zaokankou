<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>イベント詳細</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* イベント詳細専用の装飾 */
    .event-meta {
      background: #f9f9f9;
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 20px;
      border-left: 5px solid #e74c3c;
    }
    .label {
      background: #e74c3c;
      color: white;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 0.8rem;
      margin-right: 10px;
      font-weight: bold;
    }
    #event-date {
      font-weight: bold;
      color: #333;
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="detail-container">
      <a href="index.html" class="back-link" style="display: inline-block; margin-bottom: 20px;">← 一覧に戻る</a>
      
      <article>
        <h1 id="post-title">イベント情報を読み込み中...</h1>
        
        <div class="event-meta">
          <p><span class="label">開催日</span> <span id="event-date">---</span></p>
        </div>

        <div id="post-body">
          </div>
      </article>
    </div>
  </main>

  <script>
    // 1. 設定情報
    const SERVICE_DOMAIN = 'zaou0515'; 
    const API_KEY = 'yEh5YWV11pGfkdBh3PgNT8uO90TiBqNmSUDU';

    // 2. URLから記事IDを取得
    const params = new URLSearchParams(window.location.search);
    const contentId = params.get('id');

    async function fetchEventDetail() {
      // APIエンドポイント: event
      const url = `https://${SERVICE_DOMAIN}.microcms.io/api/v1/event/${contentId}`;
      
      try {
        const response = await fetch(url, {
          headers: { 'X-MICROCMS-API-KEY': API_KEY }
        });
        
        if (!response.ok) throw new Error('データの取得に失敗しました');
        
        const data = await response.json();

        // 3. 画面に反映
        // タイトル
        document.getElementById('post-title').textContent = data.title || 'タイトルなし';
        
        // 本文 (microCMSのフィールドIDに合わせて rich または content に書き換えてください)
        document.getElementById('post-body').innerHTML = data.rich || data.content || '本文がありません';

        // 開催日 (テキスト自由入力フィールド: date_text)
        if (data.date_text) {
          document.getElementById('event-date').textContent = data.date_text;
        } else {
          document.getElementById('event-date').textContent = "詳細は本文をご覧ください";
        }

      } catch (error) {
        console.error('エラー:', error);
        document.getElementById('post-title').textContent = 'イベントが見つかりませんでした';
      }
    }

    // 4. IDがある場合のみ実行
    if (contentId) {
      fetchEventDetail();
    } else {
      document.getElementById('post-title').textContent = '不正なアクセスです';
    }
  </script>
</body>
</html>
