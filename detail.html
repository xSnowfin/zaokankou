<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>詳細ページ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <div class="detail-container"> <a href="index.html" class="back-link">← 一覧に戻る</a>
      
      <article>
        <h1 id="post-title">読み込み中...</h1>
        <span id="post-date"></span>
        <hr>
        <div id="post-body">
          </div>
      </article>
    </div>
  </main>

  <script>
    const SERVICE_DOMAIN = 'zaou0515'; 
    const API_KEY = 'yEh5YWV11pGfkdBh3PgNT8uO90TiBqNmSUDU';

    // 1. URLの「?id=xxxx」の部分からIDを抜き出す
    const params = new URLSearchParams(window.location.search);
    const contentId = params.get('id');

    async function fetchDetail() {
      // 2. IDを使って、特定の記事1件だけを取得するURLを作る
      const url = `https://${SERVICE_DOMAIN}.microcms.io/api/v1/news/${contentId}`;
      
      try {
        const response = await fetch(url, {
          headers: { 'X-MICROCMS-API-KEY': API_KEY }
        });
        const data = await response.json();

        // 3. microCMS側で作った「title」と「body」を表示させる
        document.getElementById('post-title').textContent = data.title;
        document.getElementById('post-date').textContent = new Date(data.publishedAt).toLocaleDateString('ja-JP');
        document.getElementById('post-body').innerHTML = data.content; // 本文(リッチエディタ)を流し込む
      } catch (error) {
        document.getElementById('post-title').textContent = '記事が見つかりませんでした';
      }
    }

    if (contentId) {
      fetchDetail();
    }
  </script>
</body>
</html>
