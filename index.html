<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ローカル情報ポータル</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
  <div class="header-content">
    <h1>ローカル情報ポータル</h1>
    <p>地域の魅力を発信するサイト</p>
  </div>
  <div id="weather" class="weather-box">
    読み込み中...
  </div>
</header>

  <main class="container">
    <div class="content-wrapper">
      <div class="main-column">
        <section class="card">
          <h2>最新ニュース</h2>
          <ul id="news-list" class="news-list">
            <li><span class="loading">読み込み中...</span></li>
          </ul>
        </section>

        <section class="card">
          <h2>開催予定のイベント</h2>
          <ul id="event-list" class="event-list">
             </ul>
        </section>
      </div>

      <div class="side-column">
        <section class="card highlight-card">
          <h2>🍁 季節のおすすめ</h2>
          <div id="seasonal-content">
            </div>
        </section>

        <section class="card quiz-card">
          <h2>🧠 今日のご当地クイズ</h2>
          <div id="quiz-content">
            </div>
        </section>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 Local Portal Site</p>
    <h3>問い合わせ</h3>
    <address>
      <a>蔵王温泉観光協会 〒990-2301　山形市蔵王温泉708-1</a>
      <a>TEL：023-694-9328</a>
      <a>FAX：023-694-9327</a>
    </address>
  </footer>

  <script src="main.js"></script>
</body>
</html>
