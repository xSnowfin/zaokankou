<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>季節のおすすめ詳細</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <div class="detail-container">
      <a href="index.html" class="back-link">← 一覧に戻る</a>
      
      <article>
        <h1 id="post-title">読み込み中...</h1>
        <span id="post-date"></span>
        <hr>

        <div id="post-image-container" style="margin: 20px 0;"></div>

        <div id="post-body"></div>
      </article>
    </div>
  </main>

  <script>
    const SERVICE_DOMAIN = 'zaou0515'; 
    const API_KEY = 'yEh5YWV11pGfkdBh3PgNT8uO90TiBqNmSUDU';

    const params = new URLSearchParams(window.location.search);
    const contentId = params.get('id');

    async function fetchDetail() {
      // エンドポイント: seasonal
      const url = `https://${SERVICE_DOMAIN}.microcms.io/api/v1/seasonal/${contentId}`;
      
      try {
        const response = await fetch(url, {
          headers: { 'X-MICROCMS-API-KEY': API_KEY }
        });
        
        if (!response.ok) {
          throw new Error('データの取得に失敗しました');
        }

        const data = await response.json();

        // 1. タイトルを表示 (フィールドID: title)
        // ※以前の会話で title1 になっていた場合は data.title1 に書き換えてください
        document.getElementById('post-title').textContent = data.title || 'タイトルなし';
        
        // 2. 日付を表示
        document.getElementById('post-date').textContent = new Date(data.publishedAt).toLocaleDateString('ja-JP');

        // 3. 画像を表示 (もしフィールドID: image がある場合)
        if (data.image && data.image.url) {
            document.getElementById('post-image-container').innerHTML = 
                `<img src="${data.image.url}" alt="" style="max-width:100%; border-radius:8px;">`;
        }

        // 4. 本文を表示 (フィールドID: text)
        // ※もし管理画面で「content」などにしている場合は data.content に書き換え
        document.getElementById('post-body').innerHTML = data.text || '本文がありません';

      } catch (error) {
        console.error('エラー内容:', error);
        document.getElementById('post-title').textContent = '情報が見つかりませんでした';
      }
    }

    if (contentId) {
      fetchDetail();
    } else {
      document.getElementById('post-title').textContent = '記事のIDが見つかりません';
    }
  </script>
</body>
</html>
